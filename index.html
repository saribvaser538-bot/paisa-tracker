<!doctype html>
<html lang="ur">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Paisa Tracker Voice</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans&display=swap" rel="stylesheet">

<style>
body { font-family: 'IBM Plex Sans', sans-serif; background:#0f172a; color:#e2e8f0; }
.listening { animation: pulse 1s infinite; }
@keyframes pulse { 0%{opacity:1} 50%{opacity:.5} 100%{opacity:1} }
</style>
</head>

<body class="p-4">

<div class="max-w-md mx-auto">

<h1 class="text-xl font-bold mb-4">Paisa Tracker (Voice)</h1>

<!-- INPUT -->
<input id="textInput"
class="w-full p-3 rounded bg-slate-800 mb-3"
placeholder="bolain: petrol 500 ya chai 200"
/>

<!-- MIC -->
<button id="micBtn"
class="w-full p-4 rounded bg-red-500 font-bold">
🎤 Tap to Speak
</button>

<p id="status" class="mt-2 text-sm opacity-70"></p>

<!-- OUTPUT -->
<div id="log" class="mt-6 space-y-2"></div>

</div>

<script>
// =====================
// SAFE NORMALIZER
// =====================
function normalize(text){
  return text
    .toLowerCase()
    .replace(/[,\.\-\_]/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

// =====================
// URDU + ROMAN CLEANER
// =====================
function cleanVoice(text){
  if(!text) return '';

  return normalize(text)
    .replace(/ٹرانسپورٹ|transport/g,'uber')
    .replace(/پٹرول|petrol/g,'petrol')
    .replace(/چائے|chai/g,'chai')
    .replace(/روپے|rs|pkr/g,'')
    .trim();
}

// =====================
// AMOUNT PARSER
// =====================
function extractAmount(text){
  const match = text.match(/(\d+(\.\d+)?)/);
  if(!match) return 0;
  let amt = parseFloat(match[1]);

  if(text.includes('k')) amt *= 1000;

  return amt;
}

// =====================
// TYPE DETECTION
// =====================
function detectType(text){
  const income = ['mila','kamaya','received','income'];
  const expense = ['kharcha','paid','spent','petrol','chai','uber','food'];

  if(income.some(k => text.includes(k))) return 'income';
  if(expense.some(k => text.includes(k))) return 'expense';

  return 'expense'; // default safer
}

// =====================
// CATEGORY
// =====================
function category(text){
  if(text.includes('petrol')) return 'fuel';
  if(text.includes('chai')) return 'food';
  if(text.includes('uber')) return 'transport';
  return 'other';
}

// =====================
// SPEECH ENGINE (ROBUST)
// =====================
let recognition;
let listening = false;

function startVoice(){

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SR){
    alert("Speech not supported");
    return;
  }

  recognition = new SR();

  // IMPORTANT FIX:
  // start Urdu first, fallback to English INDIAN accent (works better in Pakistan)
  recognition.lang = 'ur-PK';

  recognition.interimResults = true;
  recognition.continuous = false;

  document.getElementById('status').innerText = "Listening...";

  recognition.onresult = (e)=>{
    let transcript = e.results[0][0].transcript;

    transcript = cleanVoice(transcript);

    document.getElementById('textInput').value = transcript;

    if(e.results[0].isFinal){
      process(transcript);
    }
  };

  recognition.onerror = (e)=>{
    console.log(e);
    document.getElementById('status').innerText = "Error: try again";
    listening = false;
  };

  recognition.onend = ()=>{
    listening = false;
    document.getElementById('status').innerText = "Stopped";
  };

  recognition.start();
  listening = true;
}

// =====================
// PROCESS ENTRY
// =====================
function process(text){

  const amt = extractAmount(text);
  if(!amt){
    alert("Amount samajh nahi aaya");
    return;
  }

  const type = detectType(text);
  const cat = category(text);

  const entry = {
    text,
    amount: amt,
    type,
    category: cat,
    time: new Date().toLocaleString()
  };

  render(entry);
}

// =====================
// UI RENDER
// =====================
function render(e){
  const div = document.createElement('div');
  div.className = "p-3 bg-slate-800 rounded";

  div.innerHTML = `
    <b>${e.type.toUpperCase()}</b> - ${e.category}<br/>
    Rs ${e.amount}<br/>
    <small>${e.text}</small>
  `;

  document.getElementById('log').prepend(div);
}

// =====================
// EVENTS
// =====================
document.getElementById('micBtn').onclick = startVoice;

document.getElementById('textInput').addEventListener('keydown',(e)=>{
  if(e.key==='Enter'){
    process(e.target.value);
  }
});
</script>

</body>
</html>
