<!doctype html>
<html lang="ur">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Paisa Tracker AI</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#10b981">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0f172a; color:#e2e8f0; font-family:system-ui; }
.card { background:#1e293b; padding:12px; border-radius:12px; margin-bottom:10px; }
button { cursor:pointer; }
.listening { animation:pulse 1s infinite; }
@keyframes pulse { 0%{opacity:1} 50%{opacity:.5} 100%{opacity:1} }
.small { font-size:12px; opacity:.7; }
</style>
</head>

<body class="p-4">

<div class="max-w-md mx-auto">

<h1 class="text-xl font-bold mb-3">💰 Paisa Tracker AI</h1>

<input id="input"
class="w-full p-3 rounded bg-slate-800 mb-2 outline-none"
placeholder="chai 200, petrol 1000, salary 5000"
/>

<button onclick="addText()"
class="w-full bg-emerald-500 text-black font-bold p-3 rounded mb-2">
Add Entry
</button>

<button id="micBtn" onclick="voice()"
class="w-full bg-red-500 text-white font-bold p-3 rounded mb-3">
🎤 Voice
</button>

<p id="status" class="small"></p>

<div id="list"></div>

</div>

<script>

// =========================
// STORAGE
// =========================
function getData(){
  return JSON.parse(localStorage.getItem("entries") || "[]");
}
function saveData(d){
  localStorage.setItem("entries", JSON.stringify(d));
}

// =========================
// "AI MEMORY" (no API)
// learns from corrections
// =========================
function getMemory(){
  return JSON.parse(localStorage.getItem("ai_memory") || "{}");
}
function saveMemory(mem){
  localStorage.setItem("ai_memory", JSON.stringify(mem));
}

// =========================
// CLEAN TEXT
// =========================
function clean(t){
  return t.toLowerCase()
    .replace(/[^\w\s\d]/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

// =========================
// SMART TYPE DETECTION (rules + memory)
// =========================
function detectType(text){
  const t = clean(text);
  const mem = getMemory();

  if(mem[t]?.type) return mem[t].type;

  const income = ['salary','mila','received','kamaya','payment'];
  const expense = ['chai','petrol','food','uber','bill','kharcha'];

  if(income.some(k=>t.includes(k))) return "income";
  if(expense.some(k=>t.includes(k))) return "expense";

  return "expense";
}

// =========================
// SMART CATEGORY (rules + learning)
// =========================
function detectCategory(text){
  const t = clean(text);
  const mem = getMemory();

  if(mem[t]?.category) return mem[t].category;

  const map = {
    fuel:['petrol','fuel','gas'],
    food:['chai','food','biryani','hotel'],
    transport:['uber','careem','bus','ride'],
    bills:['bill','electricity','internet'],
  };

  for(let k in map){
    if(map[k].some(x=>t.includes(x))) return k;
  }

  return "other";
}

// =========================
// AMOUNT
// =========================
function amount(t){
  const m = t.match(/(\d+)/);
  return m ? parseInt(m[1]) : 0;
}

// =========================
// ADD ENTRY
// =========================
function add(text){

  const t = clean(text);
  const amt = amount(t);
  if(!amt) return;

  const entry = {
    text,
    amount: amt,
    type: detectType(t),
    category: detectCategory(t),
    time: Date.now()
  };

  const data = getData();
  data.unshift(entry);
  saveData(data);

  render();
}

// =========================
// LEARNING SYSTEM (AI replacement)
// user correction = memory update
// =========================
function correct(index, newType, newCat){

  const data = getData();
  const item = data[index];

  const mem = getMemory();
  const key = clean(item.text);

  mem[key] = {
    type: newType,
    category: newCat
  };

  saveMemory(mem);

  item.type = newType;
  item.category = newCat;

  saveData(data);
  render();
}

// =========================
// RENDER
// =========================
function render(){

  const list = document.getElementById("list");
  const data = getData();

  list.innerHTML = "";

  data.forEach((e,i)=>{

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${e.type}</b> - ${e.category}<br/>
      Rs ${e.amount}<br/>
      <div class="small">${e.text}</div>

      <button onclick="correct(${i},'income','${e.category}')"
      class="text-green-400 text-xs mt-2">Mark Income</button>

      <button onclick="correct(${i},'expense','${e.category}')"
      class="text-red-400 text-xs ml-2">Mark Expense</button>
    `;

    list.appendChild(div);
  });
}

// =========================
// INPUT
// =========================
function addText(){
  const v = document.getElementById("input").value;
  if(!v) return;
  add(v);
  document.getElementById("input").value = "";
}

// =========================
// VOICE (stable version)
// =========================
let rec;

function voice(){

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return alert("No voice support");

  rec = new SR();
  rec.lang = 'ur-PK';
  rec.interimResults = true;

  document.getElementById("status").innerText = "Listening...";

  rec.onresult = (e)=>{
    let t = e.results[0][0].transcript;
    document.getElementById("input").value = t;

    if(e.results[0].isFinal){
      add(t);
    }
  };

  rec.onend = ()=>{
    document.getElementById("status").innerText = "";
  };

  rec.start();
}

// INIT
render();

</script>

</body>
</html>
