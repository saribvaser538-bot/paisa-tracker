<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Voice Finance</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  margin:0;
  font-family: system-ui;
  background:#0b1220;
  color:white;
}

.container{
  max-width:420px;
  margin:auto;
  padding:16px;
}

.card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:14px;
  padding:12px;
  margin-top:10px;
}

input{
  width:100%;
  padding:14px;
  border-radius:12px;
  background:#111827;
  border:1px solid #1f2937;
  color:white;
}

button{
  width:100%;
  padding:14px;
  border-radius:12px;
  margin-top:10px;
  font-weight:700;
  background:#22c55e;
  color:black;
}

.mic{
  background:#ef4444;
  color:white;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:12px;
}

.stat{
  background:#111827;
  border:1px solid #1f2937;
  padding:10px;
  border-radius:12px;
  text-align:center;
}

.small{font-size:11px;opacity:0.6}
.big{font-weight:800}
</style>
</head>

<body>

<div class="container">

<h2 style="font-size:20px;font-weight:800;">💰 Voice Finance</h2>

<input id="input" placeholder="chai 200, saad 500, salary 20000"/>

<button onclick="add()">Add Entry</button>
<button class="mic" onclick="voice()">🎤 Voice Input</button>

<div class="stats">
  <div class="stat">
    <div class="small">Income</div>
    <div class="big" id="income">0</div>
  </div>
  <div class="stat">
    <div class="small">Expense</div>
    <div class="big" id="expense">0</div>
  </div>
  <div class="stat">
    <div class="small">Net</div>
    <div class="big" id="net">0</div>
  </div>
</div>

<div id="list"></div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("data") || "[]");

// ---------- CLEAN TEXT ----------
function norm(t){
  return t.toLowerCase().replace(/\s+/g,' ').trim();
}

// ---------- AMOUNT ----------
function getAmount(t){
  let m = t.match(/(\d+)/);
  return m ? parseInt(m[1]) : 0;
}

// ---------- TYPE LOGIC (IMPORTANT FIX) ----------
function getType(t){

  const income = ["salary","income","kamai","mila","received","bonus","freelance","payment"];
  const expense = ["petrol","fuel","chai","food","khana","uber","careem","bus","rent","bill"];

  if(income.some(w=>t.includes(w))) return "income";
  if(expense.some(w=>t.includes(w))) return "expense";

  // DEFAULT RULE:
  // if unknown word like "saad 500" → treat as expense
  return "expense";
}

// ---------- CATEGORY ----------
function getCategory(t){

  if(t.includes("petrol") || t.includes("fuel")) return "Fuel ⛽";
  if(t.includes("chai") || t.includes("food") || t.includes("khana")) return "Food 🍵";
  if(t.includes("uber") || t.includes("careem") || t.includes("bus")) return "Transport 🚗";
  if(t.includes("salary")) return "Income 💰";

  return "Other 📦";
}

// ---------- ADD ENTRY ----------
function add(){

  let raw = document.getElementById("input").value;
  let t = norm(raw);

  let amt = getAmount(t);
  if(!amt) return alert("Amount missing");

  let item = {
    text: raw,           // keeps "saad" etc EXACTLY as user said
    amount: amt,
    type: getType(t),
    category: getCategory(t)
  };

  data.push(item);
  localStorage.setItem("data", JSON.stringify(data));

  document.getElementById("input").value="";
  render();
}

// ---------- VOICE INPUT ----------
function voice(){

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR) return alert("Voice not supported");

  let rec = new SR();

  rec.lang = "en-US"; // more stable than ur-PK in browsers
  rec.interimResults = false;

  rec.onresult = (e)=>{
    let text = e.results[0][0].transcript;
    document.getElementById("input").value = text;
    add();
  };

  rec.start();
}

// ---------- CALCULATOR ----------
function calc(){

  let income = 0;
  let expense = 0;

  data.forEach(d=>{
    if(d.type === "income") income += d.amount;
    else expense += d.amount;
  });

  document.getElementById("income").innerText = income;
  document.getElementById("expense").innerText = expense;
  document.getElementById("net").innerText = income - expense;
}

// ---------- RENDER ----------
function render(){

  let list = document.getElementById("list");
  list.innerHTML = "";

  data.slice().reverse().forEach(d=>{

    let div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <b>${d.text}</b><br>
      ${d.category} • ${d.type}<br>
      Rs ${d.amount}
    `;

    list.appendChild(div);
  });

  calc();
}

render();

</script>

</body>
</html>
