<!doctype html>
<html lang="ur">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Paisa Tracker</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#10b981">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: system-ui, sans-serif;
  background:#0f172a;
  color:#e2e8f0;
}

.card {
  background:#1e293b;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
}

button {
  cursor:pointer;
}

.listening {
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%{opacity:1}
  50%{opacity:.5}
  100%{opacity:1}
}
</style>
</head>

<body class="p-4">

<div class="max-w-md mx-auto">

<h1 class="text-xl font-bold mb-4">💰 Paisa Tracker</h1>

<!-- INPUT -->
<input id="input"
class="w-full p-3 rounded bg-slate-800 mb-3 outline-none"
placeholder="bolain: chai 200, petrol 1000"
/>

<button onclick="addFromText()"
class="w-full bg-emerald-500 text-black font-bold p-3 rounded mb-3">
Add Entry
</button>

<!-- VOICE -->
<button id="micBtn"
class="w-full bg-red-500 text-white font-bold p-3 rounded mb-2"
onclick="toggleVoice()">
🎤 Voice Input
</button>

<p id="status" class="text-sm opacity-60 mb-4"></p>

<!-- LIST -->
<div id="list"></div>

</div>

<script>

// =====================
// STORAGE
// =====================
function getData(){
  return JSON.parse(localStorage.getItem("entries") || "[]");
}

function saveData(data){
  localStorage.setItem("entries", JSON.stringify(data));
}

// =====================
// CLEAN INPUT
// =====================
function clean(text){
  return text.toLowerCase()
    .replace(/[^\w\s\d]/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

// =====================
// AMOUNT
// =====================
function amount(text){
  const m = text.match(/(\d+)/);
  return m ? parseInt(m[1]) : 0;
}

// =====================
// TYPE
// =====================
function type(text){
  const income = ['mila','kamaya','received'];
  const expense = ['chai','petrol','uber','kharcha'];

  if(income.some(k=>text.includes(k))) return "income";
  if(expense.some(k=>text.includes(k))) return "expense";

  return "expense";
}

// =====================
// CATEGORY
// =====================
function category(text){
  if(text.includes("petrol")) return "fuel";
  if(text.includes("chai")) return "food";
  if(text.includes("uber")) return "transport";
  return "other";
}

// =====================
// ADD ENTRY
// =====================
function add(text){

  const cleanText = clean(text);
  const amt = amount(cleanText);

  if(!amt) return alert("Amount missing");

  const entry = {
    text,
    amount: amt,
    type: type(cleanText),
    category: category(cleanText),
    time: new Date().toISOString()
  };

  const data = getData();
  data.unshift(entry);
  saveData(data);

  render();
}

// =====================
// UI RENDER
// =====================
function render(){

  const list = document.getElementById("list");
  const data = getData();

  list.innerHTML = "";

  data.forEach(e=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <b>${e.type.toUpperCase()}</b><br/>
      ${e.category} - Rs ${e.amount}<br/>
      <small>${e.text}</small>
    `;

    list.appendChild(div);
  });
}

// =====================
// TEXT INPUT
// =====================
function addFromText(){
  const val = document.getElementById("input").value;
  if(!val) return;
  add(val);
  document.getElementById("input").value = "";
}

// =====================
// VOICE INPUT (FIXED)
// =====================
let recognition;
let listening = false;

function toggleVoice(){

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SR){
    alert("Voice not supported");
    return;
  }

  recognition = new SR();

  recognition.lang = 'ur-PK';
  recognition.interimResults = true;

  document.getElementById("status").innerText = "Listening...";

  recognition.onresult = (e)=>{
    let text = e.results[0][0].transcript;
    text = clean(text);

    document.getElementById("input").value = text;

    if(e.results[0].isFinal){
      add(text);
    }
  };

  recognition.onerror = ()=>{
    document.getElementById("status").innerText = "Error, try again";
  };

  recognition.onend = ()=>{
    document.getElementById("status").innerText = "";
  };

  recognition.start();
}

// =====================
// INIT
// =====================
window.onload = render;

</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js');
}
</script>

</body>
</html>
