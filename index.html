<!doctype html>
<html lang="ur">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Paisa Tracker Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  margin:0;
  font-family: system-ui, -apple-system, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
}

/* container */
.wrap{
  max-width:420px;
  margin:0 auto;
  padding:16px;
}

/* header */
h1{
  font-size:22px;
  font-weight:700;
  letter-spacing:-0.5px;
}

/* cards */
.card{
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(10px);
  border-radius:16px;
  padding:14px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* inputs */
input{
  width:100%;
  padding:14px;
  border-radius:14px;
  background: rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  color:white;
  outline:none;
}

/* button */
button{
  width:100%;
  padding:14px;
  border-radius:14px;
  background: linear-gradient(135deg,#10b981,#059669);
  color:black;
  font-weight:700;
  margin-top:10px;
  box-shadow: 0 10px 20px rgba(16,185,129,0.2);
}

/* grid stats */
.grid3{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:16px;
}

.stat{
  padding:12px;
  border-radius:14px;
  background: rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  text-align:center;
}

.label{
  font-size:11px;
  opacity:0.6;
}

.value{
  font-size:16px;
  font-weight:700;
  margin-top:4px;
}

/* list */
.item{
  padding:12px;
  border-radius:14px;
  background: rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.06);
  margin-top:10px;
}

.tag{
  font-size:11px;
  opacity:0.6;
}

.amount{
  font-weight:700;
  margin-top:4px;
}
</style>
</head>

<body>

<div class="wrap">

  <h1>💰 Paisa Tracker</h1>
  <p style="opacity:0.5;font-size:13px;margin-top:4px;">
    Voice-free MVP • Offline finance tracker
  </p>

  <div style="margin-top:14px;">
    <input id="input" placeholder="petrol 500, chai 100, salary 20000"/>
    <button onclick="add()">Add Transaction</button>
  </div>

  <!-- STATS -->
  <div class="grid3">
    <div class="stat">
      <div class="label">Income</div>
      <div class="value" id="income">0</div>
    </div>
    <div class="stat">
      <div class="label">Expense</div>
      <div class="value" id="expense">0</div>
    </div>
    <div class="stat">
      <div class="label">Net</div>
      <div class="value" id="net">0</div>
    </div>
  </div>

  <!-- LIST -->
  <div id="list" style="margin-top:16px;"></div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("data") || "[]");

function norm(t){
  return t.toLowerCase().trim();
}

function amount(t){
  let m = t.match(/(\d+)/);
  return m ? parseInt(m[1]) : 0;
}

function type(t){

  const income = ["salary","income","kamai","mila","received","bonus"];
  const expense = ["petrol","fuel","chai","food","khana","uber","careem","bus","bill","rent"];

  if(income.some(w=>t.includes(w))) return "income";
  if(expense.some(w=>t.includes(w))) return "expense";

  return "expense";
}

function category(t){
  if(t.includes("petrol")||t.includes("fuel")) return "Fuel ⛽";
  if(t.includes("chai")||t.includes("food")) return "Food 🍵";
  if(t.includes("uber")||t.includes("bus")) return "Transport 🚗";
  if(t.includes("salary")) return "Income 💰";
  return "Other 📦";
}

function add(){

  let raw = document.getElementById("input").value;
  let t = norm(raw);

  let amt = amount(t);
  if(!amt){
    alert("Amount missing");
    return;
  }

  let item = {
    text: raw,
    amount: amt,
    type: type(t),
    category: category(t)
  };

  data.push(item);
  localStorage.setItem("data", JSON.stringify(data));

  document.getElementById("input").value = "";
  render();
}

function calc(){

  let income = 0;
  let expense = 0;

  data.forEach(d=>{
    if(d.type==="income") income += d.amount;
    else expense += d.amount;
  });

  document.getElementById("income").innerText = income;
  document.getElementById("expense").innerText = expense;
  document.getElementById("net").innerText = income - expense;
}

function render(){

  let list = document.getElementById("list");
  list.innerHTML = "";

  data.slice().reverse().forEach(d=>{

    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div style="font-weight:600">${d.text}</div>
      <div class="tag">${d.category} • ${d.type}</div>
      <div class="amount">Rs ${d.amount}</div>
    `;

    list.appendChild(div);
  });

  calc();
}

render();

</script>

</body>
</html>
