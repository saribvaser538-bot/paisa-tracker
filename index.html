<!doctype html>
<html lang="ur">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Paisa Tracker Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  margin:0;
  font-family: system-ui;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
}

.wrap{max-width:420px;margin:auto;padding:16px}

h1{font-size:22px;font-weight:800}

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:14px;
  margin-top:10px;
}

input{
  width:100%;
  padding:14px;
  border-radius:14px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  color:white;
  outline:none;
}

button{
  width:100%;
  padding:14px;
  border-radius:14px;
  margin-top:10px;
  background:linear-gradient(135deg,#10b981,#059669);
  font-weight:800;
  color:black;
  border:none;
}

.mic{
  background:#ef4444;
  color:white;
}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:14px;
}

.stat{
  background:rgba(255,255,255,0.05);
  padding:12px;
  border-radius:14px;
  text-align:center;
}

.small{font-size:11px;opacity:0.6}
.big{font-weight:800}

</style>
</head>

<body>

<div class="wrap">

<h1>💰 Paisa Tracker</h1>

<input id="input" placeholder="chai 100, petrol 500, salary 20000"/>

<button onclick="add()">Add Entry</button>
<button class="mic" onclick="toggleVoice()">🎤 Voice Input</button>

<div class="stats">
  <div class="stat"><div class="small">Income</div><div class="big" id="income">0</div></div>
  <div class="stat"><div class="small">Expense</div><div class="big" id="expense">0</div></div>
  <div class="stat"><div class="small">Net</div><div class="big" id="net">0</div></div>
</div>

<div id="list"></div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("data") || "[]");

/* =========================
   🔥 VOICE CLEANER (IMPORTANT)
========================= */
function cleanText(text){
  return text
    .toLowerCase()
    .replace(/rupees|rupay|rs|pkr|pakistani|currency/g,'')
    .replace(/for|mein|ka|ki|ke|pe|par/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

/* =========================
   AMOUNT DETECTION
========================= */
function getAmount(t){
  const m = t.match(/(\d+)/);
  return m ? parseInt(m[1]) : 0;
}

/* =========================
   FIXED TYPE DETECTION (IMPORTANT FIX)
========================= */
function getType(t){

  const incomeWords = [
    "salary","income","kamai","mila","received","bonus",
    "bheja","payment","freelance","earning","profit"
  ];

  const expenseWords = [
    "petrol","fuel","chai","food","khana","uber","careem",
    "bus","rickshaw","bill","rent","shopping","medicine"
  ];

  // STRICT CHECK (prevents misclassification bug)
  for(let w of incomeWords){
    if(t.includes(w)) return "income";
  }

  for(let w of expenseWords){
    if(t.includes(w)) return "expense";
  }

  // fallback
  return "expense";
}

/* =========================
   CATEGORY SYSTEM
========================= */
function getCategory(t){

  if(t.includes("petrol") || t.includes("fuel")) return "Fuel ⛽";
  if(t.includes("chai") || t.includes("food") || t.includes("khana")) return "Food 🍵";
  if(t.includes("uber") || t.includes("careem") || t.includes("bus")) return "Transport 🚗";
  if(t.includes("salary") || t.includes("income")) return "Income 💰";
  if(t.includes("bill")) return "Bills 📱";

  return "Other 📦";
}

/* =========================
   ADD ENTRY
========================= */
function add(){

  let raw = document.getElementById("input").value;
  let t = cleanText(raw);

  let amt = getAmount(t);
  if(!amt){
    alert("Amount missing");
    return;
  }

  data.push({
    text: raw,
    amount: amt,
    type: getType(t),
    category: getCategory(t)
  });

  localStorage.setItem("data", JSON.stringify(data));

  document.getElementById("input").value = "";

  render();
}

/* =========================
   🔥 VOICE (UPGRADED)
========================= */
let rec;
let listening = false;

function toggleVoice(){

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SR){
    alert("Voice not supported in this browser");
    return;
  }

  if(listening){
    rec.stop();
    return;
  }

  rec = new SR();

  // 🔥 BEST OPTION FOR PAKISTAN (IMPORTANT FIX)
  rec.lang = "en-IN";
  rec.interimResults = true;
  rec.continuous = false;

  rec.onstart = ()=> listening = true;

  rec.onerror = (e)=>{
    console.log("voice error:", e.error);
    listening = false;
  };

  rec.onresult = (e)=>{

    let raw = e.results[0][0].transcript;

    document.getElementById("input").value = raw;

    if(e.results[0].isFinal){

      setTimeout(()=>{
        let cleaned = cleanText(raw);
        document.getElementById("input").value = cleaned;
        add();
      }, 120);
    }
  };

  rec.onend = ()=> listening = false;

  rec.start();
}

/* =========================
   CALCULATOR
========================= */
function calc(){

  let income = 0;
  let expense = 0;

  data.forEach(d=>{
    if(d.type === "income") income += d.amount;
    else expense += d.amount;
  });

  document.getElementById("income").innerText = income;
  document.getElementById("expense").innerText = expense;
  document.getElementById("net").innerText = income - expense;
}

/* =========================
   RENDER
========================= */
function render(){

  let list = document.getElementById("list");
  list.innerHTML = "";

  data.slice().reverse().forEach(d=>{

    let el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <b>${d.text}</b><br>
      ${d.category} • ${d.type}<br>
      Rs ${d.amount}
    `;

    list.appendChild(el);
  });

  calc();
}

render();

</script>

</body>
</html>
