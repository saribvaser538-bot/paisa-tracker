<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Paisa Tracker Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: Inter, sans-serif;
  background:#0b1220;
  color:#e5e7eb;
}

.container{
  max-width:520px;
  margin:auto;
  padding:16px;
}

.card{
  background:#111a2e;
  border:1px solid #1f2a44;
  border-radius:16px;
  padding:14px;
  margin-bottom:12px;
}

h1{font-size:18px;margin:0;}
.small{font-size:12px;opacity:.7}

.row{display:flex;gap:10px}

input{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:1px solid #2a3550;
  background:#0f172a;
  color:white;
}

button{
  padding:12px 14px;
  border-radius:12px;
  border:none;
  background:#22c55e;
  color:#000;
  font-weight:600;
}

button.voice{
  background:#ef4444;
  color:white;
  width:56px;
}

.entry{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #1f2a44;
  font-size:14px;
}

.tag{
  font-size:11px;
  opacity:.7;
}

.income{color:#22c55e}
.expense{color:#ef4444}

.bottom-ad{
  text-align:center;
  font-size:11px;
  opacity:.4;
  padding:10px;
  border-top:1px solid #1f2a44;
  margin-top:20px;
}

.mic-active{
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.1)}
  100%{transform:scale(1)}
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h1>Paisa Tracker</h1>
    <div class="small">Voice + manual expense tracking (Urdu optimized)</div>
  </div>

  <div class="card">
    <div class="row">
      <input id="text" placeholder="e.g. petrol 500, saad 1000, chai 200"/>
      <button onclick="addText()">Add</button>
      <button class="voice" id="mic" onclick="toggleVoice()">🎤</button>
    </div>
    <div class="small" id="status">Tap mic or type</div>
  </div>

  <div class="card">
    <div><b>Summary</b></div>
    <div class="small">Income: <span id="inc">0</span></div>
    <div class="small">Expense: <span id="exp">0</span></div>
    <div class="small"><b>Net: <span id="net">0</span></b></div>
  </div>

  <div class="card" id="list"></div>

  <div class="bottom-ad">
    Ad space (remove in PRO)
  </div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("paisa")||"[]");

// ---------- NORMALIZER ----------
function clean(t){
  return t.toLowerCase()
    .replace(/[^\p{L}\p{N}\s]/gu,' ')
    .replace(/\s+/g,' ')
    .trim();
}

// ---------- CATEGORY ----------
function category(t){
  if(/petrol|fuel|diesel|cng/.test(t)) return "fuel";
  if(/chai|khana|food|biryani/.test(t)) return "food";
  if(/uber|careem|bus|rickshaw/.test(t)) return "transport";
  return "other";
}

// ---------- INTENT FIX (IMPORTANT FIX) ----------
function type(t){
  if(/salary|income|mila|kamai|received/.test(t)) return "income";
  return "expense";
}

// ---------- AMOUNT ----------
function amount(t){
  let m = t.match(/\d+/);
  return m ? parseInt(m[0]) : 0;
}

// ---------- ADD ----------
function add(text){
  text = clean(text);
  let amt = amount(text);
  if(!amt) return;

  let obj = {
    text,
    amount: amt,
    type: type(text),
    cat: category(text),
    time: new Date().toLocaleString()
  };

  data.push(obj);
  localStorage.setItem("paisa", JSON.stringify(data));
  render();
}

// ---------- UI ----------
function render(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  let inc=0, exp=0;

  data.forEach(d=>{
    if(d.type==="income") inc+=d.amount;
    else exp+=d.amount;

    let div=document.createElement("div");
    div.className="entry";
    div.innerHTML=`
      <div>
        ${d.text}
        <div class="tag">${d.cat}</div>
      </div>
      <div class="${d.type}">
        ${d.type==="income"?"+":"-"}${d.amount}
      </div>
    `;
    list.appendChild(div);
  });

  document.getElementById("inc").innerText=inc;
  document.getElementById("exp").innerText=exp;
  document.getElementById("net").innerText=inc-exp;
}

// ---------- INPUT ----------
function addText(){
  let t=document.getElementById("text").value;
  if(t) add(t);
  document.getElementById("text").value="";
}

// ---------- VOICE (IMPROVED BUT NOT MAGIC) ----------
let rec;
function toggleVoice(){
  let mic=document.getElementById("mic");
  let status=document.getElementById("status");

  if(!rec){
    rec = new (window.SpeechRecognition||window.webkitSpeechRecognition)();
    rec.lang="ur-PK";
    rec.interimResults=false;

    rec.onresult=(e)=>{
      let t=e.results[0][0].transcript;
      status.innerText="Heard: "+t;
      add(t);
    };

    rec.onend=()=>{
      mic.classList.remove("mic-active");
      status.innerText="Tap mic or type";
    };
  }

  mic.classList.add("mic-active");
  status.innerText="Listening...";
  rec.start();
}

render();
</script>

</body>
</html>
