<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Paisa Tracker</title>

<style>
body{
  margin:0;
  font-family:system-ui, sans-serif;
  background:#0b1220;
  color:#e5e7eb;
}

.container{
  max-width:520px;
  margin:auto;
  padding:16px;
}

.card{
  background:#111a2e;
  border:1px solid #1f2a44;
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}

h1{margin:0;font-size:18px}

.row{display:flex;gap:8px}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #2a3550;
  background:#0f172a;
  color:white;
}

button{
  padding:12px 14px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  font-weight:600;
}

.voice{
  background:#ef4444;
  color:white;
  width:54px;
}

.entry{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #1f2a44;
  font-size:14px;
}

.small{font-size:12px;opacity:.7}
.tag{font-size:11px;opacity:.6}

.income{color:#22c55e}
.expense{color:#ef4444}

.ad{
  text-align:center;
  font-size:11px;
  opacity:.4;
  padding:10px;
  border-top:1px solid #1f2a44;
}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h1>Paisa Tracker</h1>
    <div class="small">Voice + manual tracker (stable logic build)</div>
  </div>

  <div class="card">
    <div class="row">
      <input id="text" placeholder="petrol 500, saad ne 1000 diya, chai 200"/>
      <button onclick="addText()">Add</button>
      <button class="voice" onclick="toggleVoice()">🎤</button>
    </div>
    <div class="small" id="status">Ready</div>
  </div>

  <div class="card">
    <div><b>Summary</b></div>
    <div class="small">Income: <span id="inc">0</span></div>
    <div class="small">Expense: <span id="exp">0</span></div>
    <div class="small"><b>Net: <span id="net">0</span></b></div>
  </div>

  <div class="card" id="list"></div>

  <div class="ad">Ad space (PRO removes this)</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("paisa") || "[]");

// ---------- CLEAN ----------
function clean(t){
  return t.toLowerCase().replace(/[^\p{L}\p{N}\s]/gu,' ').replace(/\s+/g,' ').trim();
}

// ---------- AMOUNT ----------
function amount(t){
  let m = t.match(/\d+/);
  return m ? parseInt(m[0]) : 0;
}

// ---------- CATEGORY ----------
function category(t){
  if(/petrol|fuel|diesel|cng/.test(t)) return "fuel";
  if(/chai|khana|food|biryani|hotel/.test(t)) return "food";
  if(/uber|careem|bus|rickshaw/.test(t)) return "transport";
  if(/bill|bijli|mobile|internet/.test(t)) return "bills";
  if(/doctor|medicine/.test(t)) return "medical";
  return "other";
}

// ---------- INTENT ENGINE (FIXED PROPERLY) ----------
function type(t){
  t = clean(t);

  // MONEY COMING IN
  const incomeRules = [
    "mila","mil gaya","received","aaya","diya","bheja",
    "salary","income","kamai","bonus","refund"
  ];

  // MONEY GOING OUT
  const expenseRules = [
    "kharcha","lag gaye","spent","paid","kata","cut",
    "petrol","chai","food","uber","careem","bill"
  ];

  let incomeScore = 0;
  let expenseScore = 0;

  incomeRules.forEach(w => { if(t.includes(w)) incomeScore++; });
  expenseRules.forEach(w => { if(t.includes(w)) expenseScore++; });

  // direction override (MOST IMPORTANT)
  if(/ne .* diya/.test(t)) incomeScore += 2;
  if(/kharcha|lag gaye/.test(t)) expenseScore += 2;

  return incomeScore > expenseScore ? "income" : "expense";
}

// ---------- ADD ----------
function add(text){
  text = clean(text);
  let amt = amount(text);
  if(!amt) return;

  let obj = {
    text,
    amount: amt,
    type: type(text),
    cat: category(text),
    time: new Date().toLocaleString()
  };

  data.push(obj);
  localStorage.setItem("paisa", JSON.stringify(data));
  render();
}

// ---------- RENDER ----------
function render(){
  let list=document.getElementById("list");
  list.innerHTML="";

  let inc=0, exp=0;

  data.forEach(d=>{
    if(d.type==="income") inc+=d.amount;
    else exp+=d.amount;

    let div=document.createElement("div");
    div.className="entry";
    div.innerHTML=`
      <div>
        ${d.text}
        <div class="tag">${d.cat}</div>
      </div>
      <div class="${d.type}">
        ${d.type==="income"?"+":"-"}${d.amount}
      </div>
    `;
    list.appendChild(div);
  });

  document.getElementById("inc").innerText=inc;
  document.getElementById("exp").innerText=exp;
  document.getElementById("net").innerText=inc-exp;
}

// ---------- INPUT ----------
function addText(){
  let t=document.getElementById("text").value;
  if(t) add(t);
  document.getElementById("text").value="";
}

// ---------- VOICE ----------
let rec;

function toggleVoice(){
  let status=document.getElementById("status");

  if(!rec){
    rec = new (window.SpeechRecognition||window.webkitSpeechRecognition)();
    rec.lang="ur-PK";
    rec.interimResults=false;

    rec.onresult=(e)=>{
      add(e.results[0][0].transcript);
    };

    rec.onerror=()=>{
      status.innerText="Voice failed";
    };

    rec.onstart=()=>{
      status.innerText="Listening...";
    };

    rec.onend=()=>{
      status.innerText="Ready";
    };
  }

  rec.start();
}

render();
</script>

</body>
</html>
